name: Build & Release

on:
  release:
    types: [published]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish
        run: dotnet publish -c Release

      - name: Package
        run: |
          mkdir -p OpenGen
          cp bin/Release/net8.0/publish/OpenGen.dll OpenGen/
          cp bin/Release/net8.0/publish/gencode.sh OpenGen/
          zip -r OpenGen-${{ github.ref_name }}.zip OpenGen/

      - name: Upload release asset
        run: gh release upload ${{ github.ref_name }} OpenGen-${{ github.ref_name }}.zip
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
